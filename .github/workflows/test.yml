name: Tests

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        working-directory: backend
        run: pytest tests/ -v
        env:
          DB_PATH: ":memory:"
          GOOGLE_SHEET_ID: ""
          GOOGLE_CREDENTIALS_PATH: ""
          TELEGRAM_TOKEN: ""
          TELEGRAM_CHAT_ID: ""
          OPENAI_API_KEY: ""
          DEVICE_API_KEY: ""
